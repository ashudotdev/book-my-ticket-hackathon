services:
  - type: web
    name: book-my-ticket-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.mjs
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: book-my-ticket-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: book-my-ticket-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: book-my-ticket-backend
          property: url

databases:
  - name: book-my-ticket-db
    databaseName: book_my_ticket
    user: book_my_ticket_user
    plan: free
